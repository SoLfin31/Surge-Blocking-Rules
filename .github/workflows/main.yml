name: Update Surge Rules

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Convert Rules
        run: |
          curl -L "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/nsfw-onlydomains.txt" 
          | grep -v '^#' 
          | grep -v '^$' 
          | sed 's/^/DOMAIN,/' 
          > surge-nsfw.txt

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email [github-actions@github.com](mailto:github-actions@github.com)

          git add surge-nsfw.txt
          git commit -m "Auto update Surge rules" || echo "No changes"

          git push

