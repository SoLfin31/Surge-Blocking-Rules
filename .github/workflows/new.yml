name: Update Surge Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Convert Rules
        run: |
          # 下载原始域名列表
          curl -L "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/nsfw-onlydomains.txt" \
            | grep -v '^#' \
            | grep -v '^$' \
            > domains.txt

          # 生成 Surge 规则
          sed 's/^/DOMAIN,/' domains.txt \
            > surge-nsfw.txt

          # 生成 Clash Verge 规则
          while read domain; do
            printf -- "- 'DOMAIN-SUFFIX,%s,REJECT'\n" "$domain"
          done < domains.txt > clashverge-nsfw.txt

          # 删除临时文件
          rm domains.txt

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add surge-nsfw.txt clashverge-nsfw.txt

          git commit -m "Auto update rules" || echo "No changes"

          git push
